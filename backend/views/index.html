<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Registration</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, gray, #cf9eff);
      }

      .form-container {
        background: white;
        padding: 30px;
        width: 100%;
        max-width: 400px;
        border-radius: 10px;
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      textarea {
        resize: none;
        height: 80px;
      }

      button {
        width: 100%;
        padding: 12px;
        background: darkgreen;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: green;
      }

      @media (max-width: 480px) {
        .form-container {
          margin: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>Student Registration</h2>
      <form action="/register" method="POST">
        <input type="text" name="fullName" placeholder="Full Name" required />
        <input
          type="text"
          name="rollNumber"
          placeholder="Roll Number"
          required
        />
        <input type="email" name="email" placeholder="Email" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <textarea name="address" placeholder="Address" required></textarea>
        <button type="submit">Register</button>
      </form>
    </div>
  </body>
</html>
